# Prometheus 配置
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rag-backend'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    # Windows 本地开发时使用 host.docker.internal 访问宿主机
    # Linux 需改为 172.17.0.1 或具体 IP
